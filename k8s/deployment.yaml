apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops1-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops1-app
  template:
    metadata:
      labels:
        app: devops1-app
    spec:
      containers:
      - name: devops1-app
        image: devops1:latest
        ports:
        - containerPort: 8080